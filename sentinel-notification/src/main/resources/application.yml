server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: sentinel-notification

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sentinel.common.event
        spring.json.use.type.headers: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false

# --- Apicurio Schema Registry ---
apicurio:
  registry:
    url: ${APICURIO_REGISTRY_URL:http://localhost:8085/apis/registry/v3}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    kafka:
      enabled: true
    redis:
      enabled: true
