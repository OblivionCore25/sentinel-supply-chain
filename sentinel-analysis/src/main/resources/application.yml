server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: sentinel-analysis

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sentinel.common.event
        spring.json.use.type.headers: true
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${SPRING_DATASOURCE_USERNAME:sentinel}
    password: ${SPRING_DATASOURCE_PASSWORD:sentinel_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# --- Sentinel-specific configuration ---
sentinel:
  analysis:
    scoring:
      depth-decay-factor: 0.3
      freshness-window-days: 365
      alert-threshold: 7.0            # Score >= 7.0 triggers alert

# --- Apicurio Schema Registry ---
apicurio:
  registry:
    url: ${APICURIO_REGISTRY_URL:http://localhost:8085/apis/registry/v3}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    kafka:
      enabled: true
    db:
      enabled: true
